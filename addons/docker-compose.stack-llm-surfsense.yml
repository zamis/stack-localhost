name: stack-llm-surfsense

networks:
  my-network-proxy:
    external: true

volumes:
  shared_temp:
  stack-llm-surfsense-data:
    external: true

services:
  surfsense-backend:
    restart: no
    image: ghcr.io/modsetter/surfsense-backend:0.0.31
    networks:
      - my-network-proxy
    expose:
      - 3000
      - 8000
    volumes:
      # - stack-llm-surfsense-data:/data
      - shared_temp:/shared_tmp
    environment:
      DATABASE_URL: postgresql+asyncpg://surfsense:surfsense@db-postgres:5432/surfsense
      CELERY_BROKER_URL: redis://db-redis:6379/0
      CELERY_RESULT_BACKEND: redis://db-redis:6379/0
      REDIS_APP_URL: redis://db-redis:6379/0
      CELERY_TASK_DEFAULT_QUEUE: surfsense
      PYTHONPATH: /app
      UVICORN_LOOP: asyncio
      UNSTRUCTURED_HAS_PATCHED_LOOP: "1"
      NEXT_FRONTEND_URL: http://surfsense.localhost
      SEARXNG_DEFAULT_HOST: http://searxng:8080
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      # Daytona Sandbox – uncomment and set credentials to enable cloud code execution
      # DAYTONA_SANDBOX_ENABLED: "TRUE"
      # DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      # DAYTONA_API_URL: ${DAYTONA_API_URL:-https://app.daytona.io/api}
      # DAYTONA_TARGET: ${DAYTONA_TARGET:-us}
      SERVICE_ROLE: api
    labels:
      virtual.caddyfile: |
        http://api.surfsense.localhost {
          reverse_proxy http://surfsense-backend:8000
        }

  surfsense-web:
    restart: no
    image: ghcr.io/modsetter/surfsense-web:0.0.31
    networks:
      - my-network-proxy
    expose:
      - 3000
    environment:
      NEXT_PUBLIC_FASTAPI_BACKEND_URL: http://api.surfsense.localhost
      NEXT_PUBLIC_ZERO_CACHE_URL: http://surfsense.localhost:5929
      NEXT_PUBLIC_FASTAPI_BACKEND_AUTH_TYPE: LOCAL
      NEXT_PUBLIC_ETL_SERVICE: DOCLING
      NEXT_PUBLIC_DEPLOYMENT_MODE: self-hosted
      FASTAPI_BACKEND_INTERNAL_URL: http://surfsense-backend:8000
    labels:
      virtual.caddyfile: |
        http://surfsense.localhost {
          reverse_proxy http://surfsense-web:3000
        }
      virtual.homefile: |
        <div>
          <a class="shadow" href="http://surfsense.localhost">surfsense</a>
          <small>http://surfsense.localhost</small>
        </div>
