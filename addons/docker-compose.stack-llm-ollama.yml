name: stack-llm-ollama

networks:
  my-network-proxy:
    external: true

volumes:
  backup:
  stack-llm-ollama-data:
    external: true

services:
  ollama:
    image: ollama/ollama:0.11.8
    restart: no
    networks:
      - my-network-proxy
    expose:
      - 11434
    ports:
      - 11434:11434
    volumes:
      - stack-llm-ollama-data:/root/.ollama
