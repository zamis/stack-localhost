name: stack-llm-localai

networks:
  my-network-proxy:
    external: true

volumes:
  stack-llm-localai-configuration:
    external: true
  stack-llm-localai-backends:
    external: true
  stack-llm-localai-models:
    external: true
  stack-llm-localai-data:
    external: true

services:
  localai:
    image: localai/localai:v4.1.3
    restart: unless-stopped    
    networks:
      - my-network-proxy
    expose:
      - 8080
    volumes:
      - stack-llm-localai-configuration:/configuration
      - stack-llm-localai-backends:/backends
      - stack-llm-localai-models:/models
      - stack-llm-localai-data:/data
    labels:
      virtual.caddyfile: |
        http://localai.localhost {
          reverse_proxy http://localai:8080 {
          }
        }
      virtual.homefile: |
        <div>
          <a class="shadow" href="http://localai.localhost">LocalAI</a>
          <small>http://localai.localhost</small>
        </div>
