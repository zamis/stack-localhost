name: stack-llm-qdrant

networks:
  my-network-proxy:
    name: my-network-proxy
    external: true

configs:
  qdrant_config:
    content: |
      log_level: INFO

services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: always
    networks:
      - my-network-proxy
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - /var/mnt-links/docker/volumes/qdrant/qdrant/storage:/qdrant/storage
    labels:
      virtual.caddyfile: |
        http://qdrant.localhost {
          reverse_proxy http://qdrant:6333 {
          }
        }
      virtual.homefile: |
        <div>
          <a class="shadow" href="http://qdrant.localhost/dashboard">qdrant</a>
          <small>http://qdrant.localhost/dashboard</small>
        </div>
