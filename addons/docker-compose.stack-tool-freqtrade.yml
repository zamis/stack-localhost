name: stack-tool-freqtrade

networks:
  my-network-proxy:
    external: true

volumes:
  stack-tool-freqtrade-data:
    external: true

services:
  freqtrade:
    restart: unless-stopped
    image: freqtradeorg/freqtrade:stable
    networks:
      - my-network-proxy
    expose:
      - 8080 # web
    volumes:
      - stack-tool-freqtrade-data:/freqtrade/user_data
    configs:
      - source: config-json
        target: /freqtrade/user_data/config.json
        mode: 0644
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --freqaimodel XGBoostRegressor
      --strategy FreqaiExampleStrategy
    # "strategy": "SampleStrategy",
    labels:
      virtual.caddyfile: |
        http://freqtrade.localhost {
          reverse_proxy http://freqtrade:8080 {
          }
        }
      virtual.homefile: |
        <div>
          <a class="shadow" href="http://freqtrade.localhost">freqtrade</a>
          <small>http://freqtrade.localhost</small>
        </div>

configs:
  config-json:
    content: |
      {
          "$$schema": "https://schema.freqtrade.io/schema.json",
          "max_open_trades": 3,
          "stake_currency": "USDT",
          "stake_amount": 30,
          "tradable_balance_ratio": 0.99,
          "fiat_display_currency": "USD",
          "timeframe": "5m",
          "dry_run": true,
          "cancel_open_orders_on_exit": false,
          "unfilledtimeout": {
              "entry": 10,
              "exit": 10,
              "exit_timeout_count": 0,
              "unit": "minutes"
          },
          "entry_pricing": {
              "price_side": "same",
              "use_order_book": true,
              "order_book_top": 1,
              "price_last_balance": 0.0,
              "check_depth_of_market": {
                  "enabled": false,
                  "bids_to_ask_delta": 1
              }
          },
          "exit_pricing": {
              "price_side": "same",
              "use_order_book": true,
              "order_book_top": 1
          },
          "exchange": {
              "name": "binance",
              "key": "your_exchange_key",
              "secret": "your_exchange_secret",
              "ccxt_config": {},
              "ccxt_async_config": {
              },
              "pair_whitelist": [
                  "ALGO/USDT",
                  "ATOM/USDT",
                  "BAT/USDT",
                  "BCH/USDT",
                  "BRD/USDT",
                  "EOS/USDT",
                  "ETH/USDT",
                  "IOTA/USDT",
                  "LINK/USDT",
                  "LTC/USDT",
                  "NEO/USDT",
                  "NXS/USDT",
                  "XMR/USDT",
                  "XRP/USDT",
                  "XTZ/USDT"
              ],
              "pair_blacklist": [
                  "BNB/.*"
              ]
          },
          "pairlists": [
              {"method": "StaticPairList"}
          ],
          "telegram": {
              "enabled": false,
              "token": "your_telegram_token",
              "chat_id": "your_telegram_chat_id"
          },
          "api_server": {
              "enabled": true,
              "listen_ip_address": "127.0.0.1",
              "listen_port": 8080,
              "verbosity": "error",
              "jwt_secret_key": "somethingRandomSomethingRandom123",
              "CORS_origins": [],
              "username": "freqtrader",
              "password": "SuperSecurePassword"
          },
          "bot_name": "freqtrade",
          "initial_state": "running",
          "force_entry_enable": false,
          "internals": {
              "process_throttle_secs": 5
          }
      }

