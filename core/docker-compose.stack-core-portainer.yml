name: stack-core-portainer

networks:
  my-network-public:
    external: true
  my-network-proxy:
    external: true

volumes:
  shared-volumes-portainer-data:
    external: true
  shared-volumes-dind-run:
    external: true

services:
  portainer:
    image: portainer/portainer-ce:2.43.0-alpine
    restart: always
    networks:
      - my-network-public
      - my-network-proxy
    expose:
      - 9000
      - 9443
    ports:
      - 9000:9000
    volumes:
      - shared-volumes-portainer-data:/data
      - shared-volumes-dind-run:/var/dind-dev-run/
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      virtual.caddyfile: |
        http://portainer.localhost {
          reverse_proxy http://portainer:9000 {
          }
        }
      virtual.homefile: |
        <div>
          <a class="shadow" href="http://portainer.localhost">portainer</a>
          <small>http://portainer.localhost</small>
        </div>
